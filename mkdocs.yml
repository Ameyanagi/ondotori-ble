site_name: ondotori-ble
site_description: Typed Python APIs for reading T&D Ondotori BLE sensor advertisements
site_url: https://ameyanagi.github.io/ondotori-ble/
repo_url: https://github.com/Ameyanagi/ondotori-ble
repo_name: Ameyanagi/ondotori-ble

theme:
  name: material
  features:
    - content.code.copy
    - navigation.footer
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Use dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Use light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            heading_level: 2
            members_order: source
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables

nav:
  - Home: index.md
  - Quick start: quickstart.md
  - Devices and protocol: protocol.md
  - Room capture: room-analysis.md
  - Reliability: reliability.md
  - Server recording: server.md
  - API reference: api.md
  - Versioning: versioning.md
  - Releasing: releasing.md
  - Manuals: manuals/README.md
  - Contributing: contributing.md

strict: true
